<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>NASA Space Explorer</title>
  <link href="style.css" rel="stylesheet" type="text/css" />
</head>
<body>
  <div class="container">
    <header class="site-header">
      <img src="img/nasa-worm-logo.png" alt="NASA Logo" class="logo" />
      <div class="header-text">
        <h1>NASA Space Explorer</h1>
        <p class="subtitle">Explore NASA's Astronomy Picture of the Day by date range.</p>
      </div>
    </header>

    <section class="fact-box">
      <h2>Did You Know?</h2>
      <p id="spaceFact">Loading a space fact...</p>
    </section>

    <section class="filters">
      <div class="input-group">
        <label for="startDate">Start Date</label>
        <input type="date" id="startDate" />
      </div>

      <div class="input-group">
        <label for="endDate">End Date</label>
        <input type="date" id="endDate" />
      </div>

      <div class="button-group">
        <button id="getImagesBtn">Get Space Images</button>
      </div>
    </section>

    <p id="loadingMessage" class="loading-message"></p>

    <section id="gallery" class="gallery">
      <div class="placeholder">
        <div class="placeholder-icon">🔭</div>
        <p>Select a date range and click "Get Space Images" to explore the cosmos!</p>
      </div>
    </section>
  </div>

  <div id="modal" class="modal hidden">
    <div class="modal-content">
      <button id="closeModal" class="close-btn" aria-label="Close modal">&times;</button>
      <div id="modalBody"></div>
    </div>
  </div>

  <script src="js/dateRange.js"></script>
  <script src="js/script.js"></script>
</body>
</html>
